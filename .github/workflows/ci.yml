name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json
      - run: npm ci
      - run: npm --prefix server ci
      - run: npm --prefix client ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
